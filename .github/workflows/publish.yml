name: Build and Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # ← ★この1行を同じインデント（字下げ）で追加！

jobs:
  build-and-publish:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # 3つのOSで同時にビルドを走らせる（マトリックス）
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ここでOSごとのコンパイル処理を書く（例）
      # 1. Mac と Linux (Ubuntu) 用のビルド手順
      - name: Build C Binary (Mac / Linux)
        if: runner.os != 'Windows'
        run: |
          cd pitsh/hts_engine_API-1.10
          autoreconf -fiv  # ← ★コレを追加（古い設定をリセット）
          ./configure
          make clean
          make

          cd ../open_jtalk-1.11
          autoreconf -fiv  # ← ★ここにも追加
          ./configure --with-hts-engine-header-path=`pwd`/../hts_engine_API-1.10/include --with-hts-engine-library-path=`pwd`/../hts_engine_API-1.10/lib --with-charset=UTF-8
          make clean
          make

          cp bin/open_jtalk ../bin/open_jtalk

      # 2. Windows 用のビルドツールの準備
      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # 3. Windows 用のビルド手順
      - name: Build C Binary (Windows)
        if: runner.os == 'Windows'
        run: |
          # Windows はパスの区切りが \ (バックスラッシュ) になります
          cd pitsh\hts_engine_API-1.10
          nmake /f Makefile.mak clean
          nmake /f Makefile.mak

          cd ..\open_jtalk-1.11
          nmake /f Makefile.mak clean
          nmake /f Makefile.mak

          # 出来上がった .exe を pitsh\bin\ にコピー
          copy bin\open_jtalk.exe ..\bin\open_jtalk.exe

      - name: Build Wheel
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        # PyPI公式のアップロード用Actionを使用
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}