name: Build and Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # 1. 各OSでバイナリ（実行ファイル）だけを作るジョブ
  build-binaries:
    name: Build binaries on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install autotools on macOS
        if: runner.os == 'macOS'
        run: brew install autoconf automake libtool

      - name: Build C Binary (Mac / Linux)
        if: runner.os != 'Windows'
        run: |
          cd pitsh/hts_engine_API-1.10
          autoreconf -fiv
          ./configure
          make clean
          make

          cd ../open_jtalk-1.11
          autoreconf -fiv
          ./configure --with-hts-engine-header-path=`pwd`/../hts_engine_API-1.10/include --with-hts-engine-library-path=`pwd`/../hts_engine_API-1.10/lib --with-charset=UTF-8
          make clean
          make

          # 【修正1】ファイル名は変えずにそのままコピー
          cp bin/open_jtalk ../bin/open_jtalk

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build C Binary (Windows)
        if: runner.os == 'Windows'
        run: |
          Get-ChildItem -Path pitsh\open_jtalk-1.11 -Filter Makefile.mak -Recurse | ForEach-Object {
              $text = Get-Content $_.FullName
              $text = $text -replace 'CHARSET_SHIFT_JIS', 'CHARSET_UTF_8'
              $text = $text -replace 'SHIFT_JIS', 'UTF-8'
              $text = $text -replace 'TP /EHsc', 'TP /EHsc /std:c++14'
              $text = $text -replace 'C:\\hts_engine_API', '..\..\hts_engine_API-1.10'
              Set-Content -Path $_.FullName -Value $text
          }

          $cppFile = "pitsh\open_jtalk-1.11\mecab\src\dictionary.cpp"
          $cppText = Get-Content $cppFile
          $cppText = $cppText -replace ': public std::binary_function<[^>]+>', ''
          Set-Content -Path $cppFile -Value $cppText

          cd pitsh\hts_engine_API-1.10
          nmake /f Makefile.mak clean
          nmake /f Makefile.mak

          cd ..\open_jtalk-1.11
          nmake /f Makefile.mak clean
          nmake /f Makefile.mak

          # 【修正2】ファイル名は変えずにそのままコピー
          copy bin\open_jtalk.exe ..\bin\open_jtalk.exe

      # 【修正3】ワイルドカードで拾い上げる
      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ runner.os }}
          # アスタリスクをつけることで、Mac/Linuxの "open_jtalk" と Windowsの "open_jtalk.exe" の両方に対応
          path: pitsh/bin/open_jtalk*
          # （※ v4 からは、同名のファイルがあってもArtifact名が違えば上書きされません）

  # 2. 3つのバイナリを集めて1つのパッケージにまとめ、PyPIへ送るジョブ
  publish-to-pypi:
    name: Package and Publish
    needs: build-binaries
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Clean up old dist files
        run: rm -rf dist/

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: pitsh/bin/
          merge-multiple: true

      # ★【追加】集結させた直後に中身を確認する「のぞき穴」
      - name: Debug - Check bin directory contents
        run: ls -la pitsh/bin/

      - name: Build Wheel
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}